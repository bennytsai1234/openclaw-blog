<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 104 104" role="img" aria-labelledby="lobsterTitle" fill="none">
  <title id="lobsterTitle">OpenClaw Lobster Icon</title>
  
  <style>
    .lobster-main { fill: #D94A38; }
    .lobster-shadow { fill: #A92E23; }
    .lobster-line {
      stroke: #A92E23;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .lobster-eye { fill: #1F2937; }
    .lobster-highlight { fill: #FF8A72; opacity: 0.35; }
  </style>

  <!-- 身體陰影層 -->
  <g id="body-shadow">
    <ellipse class="lobster-shadow" cx="52" cy="64" rx="22" ry="8"/>
    <ellipse class="lobster-shadow" cx="52" cy="73" rx="14" ry="5"/>
    <ellipse class="lobster-shadow" cx="52" cy="80" rx="9" ry="3.5"/>
  </g>

  <!-- 腳（左右各 2 條） -->
  <g id="legs">
    <path class="lobster-line" d="M38 68 Q32 75 28 78"/>
    <path class="lobster-line" d="M66 68 Q72 75 76 78"/>
    <path class="lobster-line" d="M34 62 Q26 68 22 72"/>
    <path class="lobster-line" d="M70 62 Q78 68 82 72"/>
  </g>

  <!-- 左螯 -->
  <g id="claw-left" transform="translate(22 50) rotate(-18)">
    <ellipse class="lobster-main" cx="0" cy="0" rx="13" ry="9"/>
    <path class="lobster-shadow" d="M-11 -5 Q-18 -12 -14 -18 Q-9 -14 -9 -5"/>
    <path class="lobster-shadow" d="M-11 5 Q-18 12 -14 18 Q-9 14 -9 5"/>
  </g>

  <!-- 右螯（鏡像） -->
  <g id="claw-right" transform="translate(82 50) rotate(18) scale(-1 1)">
    <ellipse class="lobster-main" cx="0" cy="0" rx="13" ry="9"/>
    <path class="lobster-shadow" d="M-11 -5 Q-18 -12 -14 -18 Q-9 -14 -9 -5"/>
    <path class="lobster-shadow" d="M-11 5 Q-18 12 -14 18 Q-9 14 -9 5"/>
  </g>

  <!-- 主身體 -->
  <g id="body">
    <ellipse class="lobster-main" cx="52" cy="56" rx="24" ry="19"/>
    <!-- 尾巴 -->
    <ellipse class="lobster-main" cx="52" cy="77" rx="12" ry="6"/>
    <ellipse class="lobster-main" cx="52" cy="85" rx="8" ry="3.5"/>
    <path class="lobster-line" d="M44 88 Q52 95 60 88"/>
  </g>

  <!-- 頭部 -->
  <g id="head">
    <ellipse class="lobster-main" cx="52" cy="36" rx="19" ry="15"/>
  </g>

  <!-- 眼睛 -->
  <g id="eyes">
    <circle class="lobster-eye" cx="44" cy="32" r="4"/>
    <circle class="lobster-eye" cx="60" cy="32" r="4"/>
    <circle fill="white" cx="45" cy="31" r="1.5"/>
    <circle fill="white" cx="61" cy="31" r="1.5"/>
  </g>

  <!-- 觸角 -->
  <g id="antennae">
    <path class="lobster-line" d="M44 24 Q36 14 32 6"/>
    <path class="lobster-line" d="M60 24 Q68 14 72 6"/>
  </g>

  <!-- 高光（左上光源） -->
  <g id="highlights">
    <ellipse class="lobster-highlight" cx="44" cy="30" rx="7" ry="3.5"/>
    <ellipse class="lobster-highlight" cx="48" cy="50" rx="10" ry="4"/>
  </g>
</svg>
